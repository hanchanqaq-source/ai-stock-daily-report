name: One-shot fix mac PATH delimiter

on:
  push:
    branches:
      - feat/windows-portable-m1
    paths:
      - .github/workflows/one-shot-fix-mac-path.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v5
        with:
          ref: feat/windows-portable-m1
          fetch-depth: 0

      - name: Apply exact macOS PATH delimiter fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          target = Path('apps/dsa-desktop/main.js')
          text = target.read_text(encoding='utf-8')
          old_split = '.split(path.delimiter)'
          old_join = 'return entries.join(path.delimiter);'

          if text.count(old_split) != 1:
              raise SystemExit(f'Expected exactly one {old_split!r}, found {text.count(old_split)}')
          if text.count(old_join) != 1:
              raise SystemExit(f'Expected exactly one {old_join!r}, found {text.count(old_join)}')

          text = text.replace(old_split, ".split(':')", 1)
          text = text.replace(old_join, "return entries.join(':');", 1)
          target.write_text(text, encoding='utf-8')
          PY

      - name: Commit fix to existing PR branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dsa-desktop/main.js
          git commit -m "fix(desktop): use POSIX delimiter for mac backend PATH"
          git push origin HEAD:feat/windows-portable-m1
