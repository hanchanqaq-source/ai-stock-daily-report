name: Authorized Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag / 发布版本号 (for example: v3.21.1)'
        required: true
        type: string
      confirmation:
        description: 'Type PUBLISH followed by the tag / 输入 PUBLISH 加版本号'
        required: true
        type: string
  issues:
    types: [opened]

concurrency:
  group: authorized-release-${{ inputs.release_tag || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.author_association == 'OWNER' &&
       startsWith(github.event.issue.title, '[release] v') &&
       contains(github.event.issue.body, '<!-- authorized-release-request -->'))
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_commit: ${{ steps.prepare.outputs.release_commit }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate explicit release authorization
        id: prepare
        env:
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          INPUT_CONFIRMATION: ${{ inputs.confirmation || '' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          ISSUE_AUTHOR_ASSOCIATION: ${{ github.event.issue.author_association || '' }}
        run: python .github/scripts/prepare_authorized_release.py

      - name: Refuse an existing GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG,
              });
              core.setFailed(`GitHub Release already exists: ${process.env.RELEASE_TAG}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info(`Release tag is unused: ${process.env.RELEASE_TAG}`);
            }

  desktop-release:
    needs: prepare-release
    permissions:
      contents: write
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
      release_commit: ${{ needs.prepare-release.outputs.release_commit }}
      create_tag: true

  verify-release:
    needs: [prepare-release, desktop-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify published GitHub Release assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const installer = `daily-stock-analysis-windows-installer-${tag}.exe`;
            const portable = `股票基金质量分析系统-Portable-${tag}.zip`;
            const expected = new Set([
              installer,
              `${installer}.blockmap`,
              `daily-stock-analysis-windows-noinstall-${tag}.zip`,
              portable,
              `${portable}.sha256`,
              `daily-stock-analysis-macos-x64-${tag}.dmg`,
              `daily-stock-analysis-macos-arm64-${tag}.dmg`,
              'latest.yml',
            ]);
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            if (release.draft || release.prerelease) {
              core.setFailed(`Release ${tag} must be a final published release`);
              return;
            }
            const assets = new Map(release.assets.map((asset) => [asset.name, asset.size]));
            const missing = [...expected].filter((name) => !assets.has(name));
            const empty = [...expected].filter((name) => assets.get(name) === 0);
            if (missing.length || empty.length) {
              core.setFailed(`Release asset verification failed. Missing: ${missing.join(', ') || 'none'}; empty: ${empty.join(', ') || 'none'}`);
              return;
            }
            core.info(`Verified ${expected.size} required assets for ${tag}`);

  report-request:
    if: >-
      always() &&
      github.event_name == 'issues' &&
      github.event.issue.author_association == 'OWNER' &&
      startsWith(github.event.issue.title, '[release] v') &&
      contains(github.event.issue.body, '<!-- authorized-release-request -->')
    needs: [prepare-release, desktop-release, verify-release]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Report release request result
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          PREPARE_RESULT: ${{ needs.prepare-release.result }}
          BUILD_RESULT: ${{ needs.desktop-release.result }}
          VERIFY_RESULT: ${{ needs.verify-release.result }}
        with:
          script: |
            const succeeded = [
              process.env.PREPARE_RESULT,
              process.env.BUILD_RESULT,
              process.env.VERIFY_RESULT,
            ].every((result) => result === 'success');
            const tag = process.env.RELEASE_TAG || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = succeeded
              ? `Release ${tag} published and all required desktop assets verified.\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`
              : `Release request did not complete. No existing tag or Release was overwritten.\n\nWorkflow: ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            if (succeeded) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
            }
